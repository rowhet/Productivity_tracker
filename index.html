<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Log Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwind-cdn@3.4.1/index.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-6 md:p-12">

    <div class="max-w-2xl mx-auto">
        <header class="mb-12 border-b border-slate-200 pb-6">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Raw Log Stream</h1>
            <p class="text-sm text-slate-500 mt-1">Reading live updates directly from a flat text file ledger.</p>
        </header>

        <div id="blog-feed" class="space-y-8">
            <p class="text-slate-400 text-sm italic">Accessing file streams...</p>
        </div>
    </div>

    <script>
        async function loadTextBlog() {
            const feedContainer = document.getElementById('blog-feed');
            try {
                // Fetch the raw text file directly from your repository path
                const response = await fetch('blog.txt?nocache=' + new Date().getTime());
                if (!response.ok) throw new Error('File path resolution mismatch');
                
                const rawText = await response.text();
                
                // Split the content into individual posts using the triple hyphen delimiter
                const posts = rawText.split('---').map(post => post.trim()).filter(post => post.length > 0);
                
                feedContainer.innerHTML = ''; // Clear loading indicator
                
                posts.forEach(post => {
                    // Split the first line (Metadata/Date) from the rest of the body text
                    const lines = post.split('\n');
                    const headerLine = lines[0];
                    const bodyText = lines.slice(1).join('<br>');
                    
                    const postCard = document.createElement('article');
                    postCard.className = "bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-3";
                    postCard.innerHTML = `
                        <div class="text-xs font-bold text-blue-600 uppercase tracking-wider">${headerLine}</div>
                        <p class="text-slate-700 leading-relaxed text-sm font-normal">${bodyText}</p>
                    `;
                    feedContainer.appendChild(postCard);
                });
                
            } catch (error) {
                feedContainer.innerHTML = `<div class="bg-red-50 text-red-700 border border-red-100 p-4 rounded-xl text-sm font-medium">❌ Error: Could not parse blog.txt stream. Ensure the file is pushed to GitHub.</div>`;
            }
        }

        // Initialize load sequence on window mounting
        window.onload = loadTextBlog;
    </script>
</body>
</html>
